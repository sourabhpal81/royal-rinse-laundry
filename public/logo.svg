<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradient for the drop/circle -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f4c81" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <!-- Gradient for gold crown -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>
  </defs>
  
  <!-- Outer Water Ripple Ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#blueGrad)" stroke-width="4" stroke-dasharray="6 3" />
  
  <!-- Inner Drop Shape -->
  <path d="M50,18 C64,36 72,48 72,62 C72,74 62,82 50,82 C38,82 28,74 28,62 C28,48 36,36 50,18 Z" fill="url(#blueGrad)" opacity="0.15" />
  
  <!-- Main Water Wave in Drop -->
  <path d="M30,64 C35,60 40,68 50,64 C60,60 65,68 70,64 C71,67 72,70 72,72 C65,78 58,78 50,78 C42,78 35,78 28,72 C28,70 29,67 30,64 Z" fill="url(#blueGrad)" />

  <!-- The Royal Crown -->
  <path d="M36,54 L40,40 L47,46 L50,36 L53,46 L60,40 L64,54 Z" fill="url(#goldGrad)" stroke="#1e3a8a" stroke-width="1" stroke-linejoin="round" />
  <circle cx="36" cy="54" r="1.5" fill="url(#goldGrad)" />
  <circle cx="64" cy="54" r="1.5" fill="url(#goldGrad)" />
  <circle cx="40" cy="40" r="1.5" fill="url(#goldGrad)" />
  <circle cx="50" cy="36" r="1.5" fill="url(#goldGrad)" />
  <circle cx="60" cy="40" r="1.5" fill="url(#goldGrad)" />

  <!-- Bubbles -->
  <circle cx="34" cy="30" r="3" fill="#60a5fa" opacity="0.6" />
  <circle cx="66" cy="32" r="2" fill="#93c5fd" opacity="0.8" />
  <circle cx="62" cy="22" r="1.5" fill="#3b82f6" opacity="0.5" />
  <circle cx="40" cy="20" r="2.5" fill="#bae6fd" opacity="0.7" />

  <!-- Sparkles -->
  <path d="M68,45 L70,48 L73,49 L70,50 L68,53 L66,50 L63,49 L66,48 Z" fill="url(#goldGrad)" />
  <path d="M28,42 L29.5,44 L31.5,44.5 L29.5,45 L28,47 L26.5,45 L24.5,44.5 L26.5,44 Z" fill="url(#goldGrad)" opacity="0.8" />
</svg>
